name: Deploy to EC2

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (provider-app)
        run: cd provider-app && npm ci

      - name: Install dependencies (user-app)
        run: cd user-app && npm ci

      - name: Build Admin Dashboard
        run: npm run build

      - name: Build Provider App
        run: npm run build:provider

      - name: Build User App
        run: npm run build:user

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          # Write SSH key to file
          echo "$EC2_SSH_KEY" > deploy_key.pem
          chmod 400 deploy_key.pem

          SSH_OPTS="-o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i deploy_key.pem"

          # Upload Admin Dashboard
          scp $SSH_OPTS -r dist/* ubuntu@$EC2_HOST:/var/www/electica/admin/

          # Upload Provider App
          scp $SSH_OPTS -r provider-app/dist/* ubuntu@$EC2_HOST:/var/www/electica/provider/

          # Upload User App
          scp $SSH_OPTS -r user-app/dist/* ubuntu@$EC2_HOST:/var/www/electica/user/

          # Upload server + config files
          scp $SSH_OPTS -r server ubuntu@$EC2_HOST:/var/www/electica/
          scp $SSH_OPTS package.json package-lock.json deploy/ecosystem.config.js ubuntu@$EC2_HOST:/var/www/electica/

          # Upload db.json only on first deploy (preserve live data)
          ssh $SSH_OPTS ubuntu@$EC2_HOST "test -f /var/www/electica/db.json" || scp $SSH_OPTS db.json ubuntu@$EC2_HOST:/var/www/electica/

          # Install production deps
          ssh $SSH_OPTS ubuntu@$EC2_HOST "cd /var/www/electica && npm ci --omit=dev"

          # Patch auth hashes in live db.json (preserves all other data)
          ssh $SSH_OPTS ubuntu@$EC2_HOST 'cd /var/www/electica && node -e "
            const fs = require(\"fs\");
            const bcrypt = require(\"bcryptjs\");
            const db = JSON.parse(fs.readFileSync(\"db.json\", \"utf8\"));
            if (!db.admins) db.admins = [];
            if (!db.agents) db.agents = [];
            const adm = db.admins.find(a => a.username === \"admin\");
            if (adm && !bcrypt.compareSync(\"admin123\", adm.passwordHash)) {
              adm.passwordHash = bcrypt.hashSync(\"admin123\", 10);
            }
            if (db.admins.length === 0) {
              db.admins.push({ id: \"ADM-001\", username: \"admin\", name: \"System Admin\", passwordHash: bcrypt.hashSync(\"admin123\", 10) });
            }
            db.agents.forEach(a => {
              if (!bcrypt.compareSync(\"agent123\", a.passwordHash)) {
                a.passwordHash = bcrypt.hashSync(\"agent123\", 10);
              }
            });
            fs.writeFileSync(\"db.json\", JSON.stringify(db, null, 2));
            console.log(\"Auth hashes verified/patched\");
          "'

          # Restart API
          ssh $SSH_OPTS ubuntu@$EC2_HOST "cd /var/www/electica && pm2 restart electica-api"

          # Clean up
          rm -f deploy_key.pem
