server {
    listen 80;
    server_name _;  # Replace with your domain or EC2 public IP

    # ── Admin Dashboard ──
    location / {
        root /var/www/electica/admin;
        try_files $uri $uri/ /index.html;
    }

    # ── Provider App ──
    location /provider/ {
        alias /var/www/electica/provider/;
        try_files $uri $uri/ /provider/index.html;
    }

    # ── User App ──
    location /app/ {
        alias /var/www/electica/user/;
        try_files $uri $uri/ /app/index.html;
    }

    # ── API Proxy to json-server ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
